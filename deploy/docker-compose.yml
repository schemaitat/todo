services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: todo
      POSTGRES_PASSWORD: todo
      POSTGRES_DB: todo
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U todo"]
      interval: 2s
      timeout: 2s
      retries: 20

  api:
    build:
      context: ../api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://todo:todo@postgres:5432/todo
      ALLOWED_ORIGINS: "*"
      BOOTSTRAP_USER_EMAIL: ${BOOTSTRAP_USER_EMAIL:-a.schemaitat@gmail.com}
      BOOTSTRAP_API_KEY: ${BOOTSTRAP_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  automation:
    build:
      context: ../automation
      dockerfile: Dockerfile
    environment:
      TODO_API_URL: http://api:8000
      TODO_API_KEY: ${TODO_API_KEY}
      TODO_CONTEXT: ${TODO_CONTEXT:-inbox}
      SNAPSHOT_EMAIL: ${TODO_SNAPSHOT_EMAIL:-${BOOTSTRAP_USER_EMAIL:-a.schemaitat@gmail.com}}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${TODO_SMTP_USER}
      SMTP_PASS: ${TODO_SMTP_PASS}
      PREFECT_SERVER_API_HOST: "0.0.0.0"
    ports:
      - "127.0.0.1:4200:4200"
    depends_on:
      - api

volumes:
  pgdata:
