services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: todo
      POSTGRES_PASSWORD: todo
      POSTGRES_DB: todo
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U todo"]
      interval: 2s
      timeout: 2s
      retries: 20

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: todo
      KC_DB_PASSWORD: todo
      KC_HOSTNAME: https://auth.${DOMAIN:-schemaitat.de}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    volumes:
      - ./keycloak/realm-todo.json:/opt/keycloak/data/import/realm-todo.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /realms/todo/.well-known/openid-configuration HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && head -1 <&3 | grep -q '200'"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s

  api:
    build:
      context: ../api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://todo:todo@postgres:5432/todo
      ALLOWED_ORIGINS: "*"
      BOOTSTRAP_USER_EMAIL: ${BOOTSTRAP_USER_EMAIL:-a.schemaitat@gmail.com}
      BOOTSTRAP_API_KEY: ${BOOTSTRAP_API_KEY:-}
      OIDC_ISSUER: ${OIDC_ISSUER:-https://auth.schemaitat.de/realms/todo}
      OIDC_JWKS_URL: ${OIDC_JWKS_URL:-http://keycloak:8080/realms/todo}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-todo-tui}
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  automation:
    build:
      context: ../automation
      dockerfile: Dockerfile
    environment:
      TODO_API_URL: http://api:8000
      TODO_API_KEY: ${TODO_API_KEY}
      TODO_CONTEXT: ${TODO_CONTEXT:-inbox}
      SNAPSHOT_EMAIL: ${TODO_SNAPSHOT_EMAIL:-${BOOTSTRAP_USER_EMAIL:-a.schemaitat@gmail.com}}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${TODO_SMTP_USER}
      SMTP_PASS: ${TODO_SMTP_PASS}
      PREFECT_SERVER_API_HOST: "0.0.0.0"
    ports:
      - "127.0.0.1:4200:4200"
    depends_on:
      - api

volumes:
  pgdata:
