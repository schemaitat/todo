services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: todo
      POSTGRES_PASSWORD: todo
      POSTGRES_DB: todo
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U todo"]
      interval: 2s
      timeout: 2s
      retries: 20

  api:
    build:
      context: ../api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://todo:todo@postgres:5432/todo
      ALLOWED_ORIGINS: "*"
      BOOTSTRAP_USER_EMAIL: ${BOOTSTRAP_USER_EMAIL:-a.schemaitat@gmail.com}
      BOOTSTRAP_API_KEY: ${BOOTSTRAP_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  n8n:
    image: n8nio/n8n:latest
    profiles: ["n8n"]
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:-changeme}
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://localhost:5678/}
      GENERIC_TIMEZONE: ${N8N_TIMEZONE:-UTC}
      N8N_PERSONALIZATION_ENABLED: "false"
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
      N8N_SECURE_COOKIE: "false"
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      # Variables exposed to workflow expressions via $env.*
      TODO_API_URL: http://api:8000
      TODO_API_KEY: ${TODO_API_KEY}
      TODO_CONTEXT: ${TODO_CONTEXT:-inbox}
      TODO_SNAPSHOT_EMAIL: ${TODO_SNAPSHOT_EMAIL:-${BOOTSTRAP_USER_EMAIL:-a.schemaitat@gmail.com}}
    ports:
      - "5678:5678"
    volumes:
      - n8ndata:/home/node/.n8n
      - ./n8n/workflows:/workflows:ro

volumes:
  pgdata:
  n8ndata:
