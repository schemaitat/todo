services:
  postgres:
    restart: unless-stopped
    ports: []

  api:
    restart: unless-stopped
    ports: []
    environment:
      ALLOWED_ORIGINS: "https://api.${DOMAIN}"
    depends_on:
      keycloak:
        condition: service_healthy

  automation:
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  caddy_data:
  caddy_config:
